<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр: Уровни научного познания</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a1e2e 0%, #0d2a3a 50%, #081520 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    padding: 16px;
  }

  .screen { width: 100%; max-width: 520px; display: none; }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }

  .start-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .start-card h1 { font-size: 1.5rem; margin-bottom: 12px; line-height: 1.3; }
  .start-card p  { font-size: 0.95rem; color: rgba(255,255,255,0.65); margin-bottom: 28px; line-height: 1.5; }
  .tag-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .tag { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; }
  .tag-cyan   { background: rgba(6,182,212,0.25);  border: 1px solid rgba(6,182,212,0.5);  color: #67e8f9; }
  .tag-amber  { background: rgba(245,158,11,0.25); border: 1px solid rgba(245,158,11,0.5); color: #fcd34d; }

  .btn-primary {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #0891b2, #0e7490);
    color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(8,145,178,0.4); }
  .btn-primary:active { transform: translateY(0); }

  .progress-wrap { padding: 0 4px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  .progress-bar-bg { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #0891b2, #67e8f9); transition: width .4s ease; }

  .card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
    padding: 36px 28px; text-align: center; min-height: 160px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .25s, background .25s;
  }
  .card.correct { border-color: #22c55e; background: rgba(34,197,94,0.12); }
  .card.wrong   { border-color: #ef4444; background: rgba(239,68,68,0.12); animation: shake .35s; }
  .card-text { font-size: 1.05rem; font-weight: 600; line-height: 1.45; }

  .streak-row { display: flex; justify-content: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: background .2s; }
  .dot.filled { background: #67e8f9; }

  .answer-row { display: flex; gap: 12px; }
  .btn-answer {
    flex: 1; padding: 16px 10px; border-radius: 14px; border: 2px solid transparent;
    font-size: 0.88rem; font-weight: 700; cursor: pointer;
    transition: transform .12s, box-shadow .12s; line-height: 1.3;
  }
  .btn-answer:active { transform: scale(.97); }
  .btn-answer:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }

  .btn-cyan  { background: rgba(6,182,212,0.2);  border-color: rgba(6,182,212,0.5);  color: #67e8f9; }
  .btn-cyan:hover:not(:disabled)  { background: rgba(6,182,212,0.35);  border-color: #06b6d4; box-shadow: 0 4px 16px rgba(6,182,212,0.3); }
  .btn-amber { background: rgba(245,158,11,0.2); border-color: rgba(245,158,11,0.5); color: #fcd34d; }
  .btn-amber:hover:not(:disabled) { background: rgba(245,158,11,0.35); border-color: #f59e0b; box-shadow: 0 4px 16px rgba(245,158,11,0.3); }

  .hint { text-align: center; font-size: 0.85rem; min-height: 22px; color: rgba(255,255,255,0.55); }
  .hint.show-correct { color: #86efac; }
  .hint.show-wrong   { color: #fca5a5; }

  .result-card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 24px;
    padding: 40px 32px; text-align: center;
  }
  .result-card h2 { font-size: 1.4rem; margin-bottom: 12px; }
  .result-phrase { font-size: 1rem; font-weight: 600; color: #67e8f9; margin-bottom: 8px; line-height: 1.4; }
  .result-date { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 28px; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide-in { animation: slideIn .25s ease; }
</style>
</head>
<body>

<div id="startScreen" class="screen active">
  <div class="start-card">
    <h1>Уровни научного познания</h1>
    <p>Определи, к какому уровню относится каждый метод или понятие</p>
    <div class="tag-row">
      <span class="tag tag-cyan">Эмпирический</span>
      <span class="tag tag-amber">Теоретический</span>
    </div>
    <p style="font-size:0.85rem; color:rgba(255,255,255,0.45);">45 понятий</p>
  </div>
  <button class="btn-primary" onclick="startQuiz()">Начать тренировку</button>
</div>

<div id="quizScreen" class="screen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressText">Усвоено: 0 / 45</span>
      <span id="remainText">Осталось: 45</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="card" id="card">
    <div class="card-text" id="cardText">—</div>
  </div>
  <div class="streak-row" id="streakRow"></div>
  <div class="answer-row">
    <button class="btn-answer btn-cyan"  id="btnEM" onclick="answer('em')">Эмпирический</button>
    <button class="btn-answer btn-amber" id="btnTE" onclick="answer('te')">Теоретический</button>
  </div>
  <div class="hint" id="hint"></div>
</div>

<div id="resultScreen" class="screen">
  <div class="result-card">
    <h2>Все понятия усвоены!</h2>
    <div class="result-phrase" id="resultPhrase"></div>
    <div class="result-date" id="resultDate"></div>
    <button class="btn-primary" onclick="restart()">Пройти ещё раз</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'trainer_science_completions';

const PHRASES = [
  "Твой скилл прокачался до уровня «бог»",
  "Отдохни, пока мы не попросили тебя объяснить Вселенную",
  "Нейросеть учится у тебя",
];

const LABELS = { em: "Эмпирический", te: "Теоретический" };
const BTNS = ['btnEM', 'btnTE'];

const ITEMS = [
  // ── Эмпирический ──
  { text: "Отражение в сознании человека внешних свойств предмета", type: "em" },
  { text: "Сохранение в памяти обобщённого образа предмета", type: "em" },
  { text: "Экспериментальная проверка данных", type: "em" },
  { text: "Описание изучаемых явлений", type: "em" },
  { text: "Анкетирование", type: "em" },
  { text: "Социологический опрос", type: "em" },
  { text: "Наблюдение", type: "em" },
  { text: "Измерение", type: "em" },
  { text: "Описание", type: "em" },
  { text: "Классификация", type: "em" },
  { text: "Систематизация", type: "em" },
  { text: "Научный факт", type: "em" },
  { text: "Эмпирические данные", type: "em" },
  { text: "Предметность", type: "em" },
  { text: "Наглядность", type: "em" },
  { text: "Проведение количественных измерений", type: "em" },
  { text: "Сбор фактов", type: "em" },
  { text: "Описание наблюдаемых явлений", type: "em" },
  { text: "Проведение контрольных измерений", type: "em" },
  { text: "Непосредственное наблюдение отдельных фактов", type: "em" },

  // ── Теоретический ──
  { text: "Логический вывод новых суждений о предмете на основе имеющихся", type: "te" },
  { text: "Отражение в сознании человека сущностных свойств предмета", type: "te" },
  { text: "Утверждение/отрицание наличия у предмета каких-либо свойств", type: "te" },
  { text: "Фиксация существенных свойств предмета", type: "te" },
  { text: "Индукция", type: "te" },
  { text: "Дедукция", type: "te" },
  { text: "Аналогия", type: "te" },
  { text: "Анализ", type: "te" },
  { text: "Синтез", type: "te" },
  { text: "Сравнение", type: "te" },
  { text: "Абстрагирование", type: "te" },
  { text: "Общие признаки", type: "te" },
  { text: "Тенденции", type: "te" },
  { text: "Теория", type: "te" },
  { text: "Закономерности", type: "te" },
  { text: "Законы", type: "te" },
  { text: "Научная парадигма", type: "te" },
  { text: "Гипотеза", type: "te" },
  { text: "Предположение", type: "te" },
  { text: "Обобщённость", type: "te" },
  { text: "Объяснение сущности изучаемых явлений", type: "te" },
  { text: "Математический анализ", type: "te" },
  { text: "Формулирование обобщений фактов", type: "te" },
  { text: "Разработка научных теорий", type: "te" },
  { text: "Объяснение выявленных между фактами взаимосвязей", type: "te" },
];

const TARGET_STREAK = 2;
const TOTAL = ITEMS.length;
let deck = [], current = null, mastered = 0, answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function balancedShuffle(arr) {
  let result = [...arr];
  shuffle(result);
  shuffle(result);
  shuffle(result);
  return result;
}

function startQuiz() {
  deck = balancedShuffle(ITEMS.map(item => ({ ...item, streak: 0 })));
  mastered = 0;
  showScreen('quizScreen');
  nextCard();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function nextCard() {
  if (deck.length === 0) { showResult(); return; }
  current = deck[0];
  answered = false;
  const card = document.getElementById('card');
  card.className = 'card slide-in';
  document.getElementById('cardText').textContent = current.text;
  BTNS.forEach(id => document.getElementById(id).disabled = false);
  document.getElementById('hint').textContent = '';
  document.getElementById('hint').className = 'hint';
  updateProgress();
  renderStreak();
  setTimeout(() => card.classList.remove('slide-in'), 300);
}

function answer(chosen) {
  if (answered) return;
  answered = true;
  BTNS.forEach(id => document.getElementById(id).disabled = true);
  const correct = chosen === current.type;
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');

  if (correct) {
    current.streak++;
    card.classList.add('correct');
    hint.textContent = '✓ Верно!';
    hint.className = 'hint show-correct';
    if (current.streak >= TARGET_STREAK) {
      deck.shift(); mastered++;
    } else {
      deck.shift();
      deck.splice(Math.min(2 + Math.floor(Math.random() * 3), deck.length), 0, current);
    }
  } else {
    current.streak = 0;
    card.classList.add('wrong');
    hint.textContent = `✗ Неверно — это: ${LABELS[current.type]}`;
    hint.className = 'hint show-wrong';
    deck.shift();
    deck.splice(Math.min(2 + Math.floor(Math.random() * 4), deck.length), 0, current);
  }
  updateProgress();
  renderStreak();
  setTimeout(nextCard, 1200);
}

function renderStreak() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (let i = 0; i < TARGET_STREAK; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (current && i < current.streak ? ' filled' : '');
    row.appendChild(dot);
  }
}

function updateProgress() {
  const pct = Math.round(mastered / TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Усвоено: ${mastered} / ${TOTAL}`;
  document.getElementById('remainText').textContent = `Осталось: ${deck.length}`;
}

function showResult() {
  const count = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
  document.getElementById('resultPhrase').textContent = PHRASES[count % PHRASES.length];
  localStorage.setItem(STORAGE_KEY, count + 1);
  const now = new Date();
  document.getElementById('resultDate').textContent =
    'Завершено: ' + now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
  showScreen('resultScreen');
}

function restart() { startQuiz(); }
</script>
</body>
</html>
