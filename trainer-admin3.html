<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр: Административные наказания и меры</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #2d0a0a 0%, #4a1515 50%, #2d0f0f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    padding: 16px;
  }

  .screen { width: 100%; max-width: 520px; display: none; }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }

  /* ─── СТАРТ ─── */
  .start-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .start-card h1 { font-size: 1.5rem; margin-bottom: 12px; line-height: 1.3; }
  .start-card p  { font-size: 0.95rem; color: rgba(255,255,255,0.65); margin-bottom: 28px; line-height: 1.5; }
  .tag-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
  }
  .tag-green { background: rgba(34,197,94,0.25);  border: 1px solid rgba(34,197,94,0.5);  color: #86efac; }
  .tag-amber { background: rgba(245,158,11,0.25); border: 1px solid rgba(245,158,11,0.5); color: #fcd34d; }

  /* ─── ГЛАВНАЯ КНОПКА ─── */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
  .btn-primary:active { transform: translateY(0); }

  /* ─── ПРОГРЕСС ─── */
  .progress-wrap { padding: 0 4px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    transition: width .4s ease;
  }

  /* ─── КАРТОЧКА ─── */
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .25s, background .25s;
  }
  .card.correct { border-color: #22c55e; background: rgba(34,197,94,0.12); }
  .card.wrong   { border-color: #ef4444; background: rgba(239,68,68,0.12); animation: shake .35s; }
  .card-text { font-size: 1.05rem; font-weight: 600; line-height: 1.45; }

  /* ─── СТРИК ─── */
  .streak-row { display: flex; justify-content: center; gap: 8px; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background .2s;
  }
  .dot.filled { background: #22c55e; }

  /* ─── КНОПКИ ОТВЕТА ─── */
  .answer-row { display: flex; gap: 12px; }
  .btn-answer {
    flex: 1;
    padding: 16px 10px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    line-height: 1.3;
  }
  .btn-answer:active { transform: scale(.97); }
  .btn-answer:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }

  .btn-green {
    background: rgba(34,197,94,0.2);
    border-color: rgba(34,197,94,0.5);
    color: #86efac;
  }
  .btn-green:hover:not(:disabled) { background: rgba(34,197,94,0.35); border-color: #22c55e; box-shadow: 0 4px 16px rgba(34,197,94,0.3); }

  .btn-amber {
    background: rgba(245,158,11,0.2);
    border-color: rgba(245,158,11,0.5);
    color: #fcd34d;
  }
  .btn-amber:hover:not(:disabled) { background: rgba(245,158,11,0.35); border-color: #f59e0b; box-shadow: 0 4px 16px rgba(245,158,11,0.3); }

  /* ─── ПОДСКАЗКА ─── */
  .hint {
    text-align: center;
    font-size: 0.85rem;
    min-height: 22px;
    color: rgba(255,255,255,0.55);
  }
  .hint.show-correct { color: #86efac; }
  .hint.show-wrong   { color: #fca5a5; }

  /* ─── РЕЗУЛЬТАТ ─── */
  .result-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .result-card h2 { font-size: 1.4rem; margin-bottom: 12px; }
  .result-phrase { font-size: 1rem; font-weight: 600; color: #fcd34d; margin-bottom: 8px; line-height: 1.4; }
  .result-date { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 28px; }

  /* ─── АНИМАЦИИ ─── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide-in { animation: slideIn .25s ease; }
</style>
</head>
<body>

<!-- ══════════ СТАРТ ══════════ -->
<div id="startScreen" class="screen active">
  <div class="start-card">
    <h1>Административные наказания и меры</h1>
    <p>Определи, к какой категории относится каждый пункт</p>
    <div class="tag-row">
      <span class="tag tag-green">Административное наказание</span>
      <span class="tag tag-amber">Мера обеспечения производства</span>
    </div>
    <p style="font-size:0.85rem; color:rgba(255,255,255,0.45);">23 понятия</p>
  </div>
  <button class="btn-primary" onclick="startQuiz()">Начать тренировку</button>
</div>

<!-- ══════════ КВИЗ ══════════ -->
<div id="quizScreen" class="screen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressText">Усвоено: 0 / 23</span>
      <span id="remainText">Осталось: 23</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="card" id="card">
    <div class="card-text" id="cardText">—</div>
  </div>

  <div class="streak-row" id="streakRow"></div>

  <div class="answer-row">
    <button class="btn-answer btn-green" id="btnAN" onclick="answer('an')">Административное<br>наказание</button>
    <button class="btn-answer btn-amber" id="btnMO" onclick="answer('mo')">Мера обеспечения<br>производства</button>
  </div>

  <div class="hint" id="hint"></div>
</div>

<!-- ══════════ РЕЗУЛЬТАТ ══════════ -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <h2>Все понятия усвоены!</h2>
    <div class="result-phrase" id="resultPhrase"></div>
    <div class="result-date" id="resultDate"></div>
    <button class="btn-primary" onclick="restart()">Пройти ещё раз</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'trainer_admin_completions';

const PHRASES = [
  "Круто разобрался!",
  "Ты только что сжёг кодификатор!",
  "Твой результат — оценка ответов из будущего!",
  "Президент РФ одобряет твой выбор!",
  "Ты только что уничтожил кривую нормального распределения!",
];

const LABELS = {
  an: "Административное наказание",
  mo: "Мера обеспечения производства",
};

const ITEMS = [
  // ── Административные наказания ──
  { text: "Предупреждение", type: "an" },
  { text: "Административный штраф", type: "an" },
  { text: "Конфискация орудия совершения или предмета административного правонарушения", type: "an" },
  { text: "Лишение специального права, предоставленного физическому лицу", type: "an" },
  { text: "Административный арест", type: "an" },
  { text: "Административное выдворение за пределы РФ иностранного гражданина или лица без гражданства", type: "an" },
  { text: "Дисквалификация", type: "an" },
  { text: "Административное приостановление деятельности", type: "an" },
  { text: "Обязательные работы", type: "an" },
  { text: "Административный запрет на посещение мест проведения официальных спортивных соревнований в дни их проведения", type: "an" },

  // ── Меры обеспечения производства по делу об административном правонарушении ──
  { text: "Доставление", type: "mo" },
  { text: "Административное задержание", type: "mo" },
  { text: "Личный досмотр, досмотр вещей, досмотр транспортного средства, находящегося при физическом лице", type: "mo" },
  { text: "Осмотр принадлежащих юридическому лицу помещений, территорий, находящихся там вещей и документов", type: "mo" },
  { text: "Изъятие вещей и документов", type: "mo" },
  { text: "Отстранение от управления транспортным средством соответствующего вида", type: "mo" },
  { text: "Освидетельствование на состояние алкогольного опьянения", type: "mo" },
  { text: "Медицинское освидетельствование на состояние опьянения", type: "mo" },
  { text: "Арест товаров, транспортных средств и иных вещей", type: "mo" },
  { text: "Привод", type: "mo" },
  { text: "Залог за арестованное судно", type: "mo" },
  { text: "Помещение иностранных граждан или лиц без гражданства, подлежащих административному выдворению, в специальные учреждения", type: "mo" },
  { text: "Арест имущества в целях обеспечения исполнения постановления о назначении административного наказания", type: "mo" },
];

const TARGET_STREAK = 2;
const REINSERT_AFTER = 3;
const TOTAL = ITEMS.length;

let deck = [];
let current = null;
let mastered = 0;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function balancedShuffle(arr) {
  // Тройное перемешивание для настоящего рандома
  let result = [...arr];
  shuffle(result);
  shuffle(result);
  shuffle(result);
  return result;
}

function startQuiz() {
  deck = balancedShuffle(ITEMS.map(item => ({ ...item, streak: 0 })));
  mastered = 0;
  showScreen('quizScreen');
  nextCard();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function nextCard() {
  if (deck.length === 0) { showResult(); return; }
  current = deck[0];
  answered = false;

  const card = document.getElementById('card');
  card.className = 'card slide-in';
  document.getElementById('cardText').textContent = current.text;
  ['btnAN', 'btnMO'].forEach(id => document.getElementById(id).disabled = false);
  document.getElementById('hint').textContent = '';
  document.getElementById('hint').className = 'hint';

  updateProgress();
  renderStreak();
  setTimeout(() => card.classList.remove('slide-in'), 300);
}

function answer(chosen) {
  if (answered) return;
  answered = true;

  ['btnAN', 'btnMO'].forEach(id => document.getElementById(id).disabled = true);

  const correct = chosen === current.type;
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');

  if (correct) {
    current.streak++;
    card.classList.add('correct');
    hint.textContent = '✓ Верно!';
    hint.className = 'hint show-correct';

    if (current.streak >= TARGET_STREAK) {
      deck.shift();
      mastered++;
    } else {
      deck.shift();
      const pos1 = 2 + Math.floor(Math.random() * 3);
      deck.splice(Math.min(pos1, deck.length), 0, current);
    }
  } else {
    current.streak = 0;
    card.classList.add('wrong');
    hint.textContent = `✗ Неверно — это: ${LABELS[current.type]}`;
    hint.className = 'hint show-wrong';
    deck.shift();
    const pos2 = 2 + Math.floor(Math.random() * 4);
    deck.splice(Math.min(pos2, deck.length), 0, current);
  }

  updateProgress();
  renderStreak();
  setTimeout(nextCard, 1200);
}

function renderStreak() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (let i = 0; i < TARGET_STREAK; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (current && i < current.streak ? ' filled' : '');
    row.appendChild(dot);
  }
}

function updateProgress() {
  const pct = Math.round(mastered / TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Усвоено: ${mastered} / ${TOTAL}`;
  document.getElementById('remainText').textContent = `Осталось: ${deck.length}`;
}

function showResult() {
  const count = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
  document.getElementById('resultPhrase').textContent = PHRASES[count % PHRASES.length];
  localStorage.setItem(STORAGE_KEY, count + 1);

  const now = new Date();
  document.getElementById('resultDate').textContent =
    'Завершено: ' + now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
  showScreen('resultScreen');
}

function restart() { startQuiz(); }
</script>
</body>
</html>
