<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр: Нац. интересы vs Традиц. ценности</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    padding: 16px;
  }

  .screen {
    width: 100%;
    max-width: 520px;
    display: none;
  }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }

  /* ─── СТАРТ ─── */
  .start-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .start-card h1 { font-size: 1.5rem; margin-bottom: 12px; line-height: 1.3; }
  .start-card p  { font-size: 0.95rem; color: rgba(255,255,255,0.65); margin-bottom: 28px; line-height: 1.5; }
  .tag-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
  }
  .tag-blue  { background: rgba(34,197,94,0.25); border: 1px solid rgba(34,197,94,0.5); color: #86efac; }
  .tag-amber { background: rgba(245,158,11,0.25); border: 1px solid rgba(245,158,11,0.5); color: #fcd34d; }

  /* ─── КНОПКИ ─── */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
  .btn-primary:active { transform: translateY(0); }

  /* ─── ПРОГРЕСС ─── */
  .progress-wrap { padding: 0 4px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    transition: width .4s ease;
  }

  /* ─── КАРТОЧКА ─── */
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .25s;
  }
  .card.correct { border-color: #22c55e; background: rgba(34,197,94,0.12); }
  .card.wrong   { border-color: #ef4444; background: rgba(239,68,68,0.12); animation: shake .35s; }

  .card-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.45;
  }

  /* ─── СТРИК ─── */
  .streak-row {
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background .2s;
  }
  .dot.filled { background: #22c55e; }

  /* ─── КНОПКИ ОТВЕТА ─── */
  .answer-row {
    display: flex;
    gap: 12px;
  }
  .btn-answer {
    flex: 1;
    padding: 16px 10px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s, border-color .2s;
    line-height: 1.3;
  }
  .btn-answer:active { transform: scale(.97); }

  .btn-blue {
    background: rgba(34,197,94,0.2);
    border-color: rgba(34,197,94,0.5);
    color: #86efac;
  }
  .btn-blue:hover { background: rgba(34,197,94,0.35); border-color: #22c55e; box-shadow: 0 4px 16px rgba(34,197,94,0.3); }

  .btn-amber {
    background: rgba(245,158,11,0.2);
    border-color: rgba(245,158,11,0.5);
    color: #fcd34d;
  }
  .btn-amber:hover { background: rgba(245,158,11,0.35); border-color: #f59e0b; box-shadow: 0 4px 16px rgba(245,158,11,0.3); }

  .btn-answer:disabled { opacity: .5; cursor: default; transform: none; box-shadow: none; }

  /* ─── ПОДСКАЗКА после ответа ─── */
  .hint {
    text-align: center;
    font-size: 0.85rem;
    min-height: 22px;
    color: rgba(255,255,255,0.55);
  }
  .hint.show-correct { color: #86efac; }
  .hint.show-wrong   { color: #fca5a5; }

  /* ─── РЕЗУЛЬТАТ ─── */
  .result-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .result-icon { font-size: 3rem; margin-bottom: 12px; }
  .result-card h2 { font-size: 1.4rem; margin-bottom: 8px; }
  .result-card p  { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 28px; }

  /* ─── АНИМАЦИИ ─── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide-in { animation: slideIn .25s ease; }
</style>
</head>
<body>

<!-- ══════════ СТАРТ ══════════ -->
<div id="startScreen" class="screen active">
  <div class="start-card">
    <h1>Тренажёр: Стратегия нацбезопасности</h1>
    <p>Определи, к какой категории относится каждый пункт</p>
    <div class="tag-row">
      <span class="tag tag-blue">Национальные интересы РФ</span>
      <span class="tag tag-amber">Традиционные ценности</span>
    </div>
    <p style="font-size:0.85rem; color:rgba(255,255,255,0.45);">42 понятия</p>
  </div>
  <button class="btn-primary" onclick="startQuiz()">Начать тренировку</button>
</div>

<!-- ══════════ КВИЗ ══════════ -->
<div id="quizScreen" class="screen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressText">Усвоено: 0 / 42</span>
      <span id="remainText">Осталось: 42</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="card" id="card">
    <div class="card-text" id="cardText">—</div>
  </div>

  <div class="streak-row" id="streakRow"></div>

  <div class="answer-row">
    <button class="btn-answer btn-blue"  id="btnNI" onclick="answer('ni')">Национальный<br>интерес</button>
    <button class="btn-answer btn-amber" id="btnTV" onclick="answer('tv')">Традиционная<br>ценность</button>
  </div>

  <div class="hint" id="hint"></div>
</div>

<!-- ══════════ РЕЗУЛЬТАТ ══════════ -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <div class="result-icon"></div>
    <h2>Все понятия усвоены!</h2>
    <p id="resultDate"></p>
    <button class="btn-primary" onclick="restart()">Пройти ещё раз</button>
  </div>
</div>

<script>
const ITEMS = [
  // ── Национальные интересы РФ ──
  { text: "Сбережение народа России", type: "ni" },
  { text: "Развитие человеческого потенциала", type: "ni" },
  { text: "Повышение качества жизни и благосостояния граждан", type: "ni" },
  { text: "Защита конституционного строя", type: "ni" },
  { text: "Защита суверенитета", type: "ni" },
  { text: "Защита независимости", type: "ni" },
  { text: "Защита государственной и территориальной целостности РФ", type: "ni" },
  { text: "Укрепление обороны страны", type: "ni" },
  { text: "Поддержание гражданского мира и согласия в стране", type: "ni" },
  { text: "Укрепление законности", type: "ni" },
  { text: "Искоренение коррупции", type: "ni" },
  { text: "Защита граждан и всех форм собственности от противоправных посягательств", type: "ni" },
  { text: "Развитие механизмов взаимодействия государства и гражданского общества", type: "ni" },
  { text: "Развитие безопасного информационного пространства", type: "ni" },
  { text: "Защита российского общества от деструктивного информационно-психологического воздействия", type: "ni" },
  { text: "Устойчивое развитие российской экономики на новой технологической основе", type: "ni" },
  { text: "Охрана окружающей среды", type: "ni" },
  { text: "Сохранение природных ресурсов и рациональное природопользование", type: "ni" },
  { text: "Адаптация к изменениям климата", type: "ni" },
  { text: "Укрепление традиционных российских духовно-нравственных ценностей", type: "ni" },
  { text: "Сохранение культурного и исторического наследия народа России", type: "ni" },
  { text: "Поддержание стратегической стабильности", type: "ni" },
  { text: "Укрепление мира и безопасности", type: "ni" },
  { text: "Укрепление правовых основ международных отношений", type: "ni" },

  // ── Традиционные духовно-нравственные ценности ──
  { text: "Жизнь", type: "tv" },
  { text: "Достоинство", type: "tv" },
  { text: "Права и свободы человека", type: "tv" },
  { text: "Патриотизм", type: "tv" },
  { text: "Гражданственность", type: "tv" },
  { text: "Служение Отечеству и ответственность за его судьбу", type: "tv" },
  { text: "Высокие нравственные идеалы", type: "tv" },
  { text: "Крепкая семья", type: "tv" },
  { text: "Созидательный труд", type: "tv" },
  { text: "Приоритет духовного над материальным", type: "tv" },
  { text: "Гуманизм", type: "tv" },
  { text: "Милосердие", type: "tv" },
  { text: "Справедливость", type: "tv" },
  { text: "Коллективизм", type: "tv" },
  { text: "Взаимопомощь и взаимоуважение", type: "tv" },
  { text: "Историческая память", type: "tv" },
  { text: "Преемственность поколений", type: "tv" },
  { text: "Единство народов России", type: "tv" },
];

const TARGET_STREAK = 2;
const REINSERT_AFTER = 3;

let deck = [];
let current = null;
let mastered = 0;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  deck = shuffle(ITEMS.map(item => ({ ...item, streak: 0 })));
  mastered = 0;
  showScreen('quizScreen');
  nextCard();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function nextCard() {
  if (deck.length === 0) { showResult(); return; }
  current = deck[0];
  answered = false;

  const card = document.getElementById('card');
  card.className = 'card slide-in';
  document.getElementById('cardText').textContent = current.text;
  document.getElementById('btnNI').disabled = false;
  document.getElementById('btnTV').disabled = false;
  document.getElementById('hint').textContent = '';
  document.getElementById('hint').className = 'hint';

  updateProgress();
  renderStreak();
  setTimeout(() => card.classList.remove('slide-in'), 300);
}

function answer(chosen) {
  if (answered) return;
  answered = true;

  document.getElementById('btnNI').disabled = true;
  document.getElementById('btnTV').disabled = true;

  const correct = chosen === current.type;
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');

  if (correct) {
    current.streak++;
    card.classList.add('correct');
    hint.textContent = '✓ Верно!';
    hint.className = 'hint show-correct';

    if (current.streak >= TARGET_STREAK) {
      deck.shift();
      mastered++;
    } else {
      deck.shift();
      deck.splice(Math.min(REINSERT_AFTER, deck.length), 0, current);
    }
  } else {
    current.streak = 0;
    card.classList.add('wrong');
    const label = current.type === 'ni' ? 'Национальный интерес' : 'Традиционная ценность';
    hint.textContent = `✗ Неверно — это: ${label}`;
    hint.className = 'hint show-wrong';
    deck.shift();
    deck.splice(Math.min(REINSERT_AFTER, deck.length), 0, current);
  }

  updateProgress();
  renderStreak();
  setTimeout(nextCard, 1100);
}

function renderStreak() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (let i = 0; i < TARGET_STREAK; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (current && i < current.streak ? ' filled' : '');
    row.appendChild(dot);
  }
}

function updateProgress() {
  const total = ITEMS.length;
  const pct = Math.round(mastered / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Усвоено: ${mastered} / ${total}`;
  document.getElementById('remainText').textContent = `Осталось: ${deck.length}`;
}

function showResult() {
  const now = new Date();
  document.getElementById('resultDate').textContent =
    'Завершено: ' + now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
  showScreen('resultScreen');
}

function restart() { startQuiz(); }
</script>
</body>
</html>
